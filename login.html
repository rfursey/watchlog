<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WatchLog — Sign In</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f0f13;
    color: #f0f0f0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .card {
    background: #1a1a24;
    border: 1px solid #2e2e3e;
    border-radius: 16px;
    padding: 40px 36px;
    width: 100%;
    max-width: 380px;
    text-align: center;
  }
  .logo { font-size: 32px; font-weight: 700; color: #e50914; margin-bottom: 6px; }
  .logo span { color: #f0f0f0; }
  .tagline { font-size: 14px; color: #888; margin-bottom: 32px; }
  .btn-signin {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    width: 100%;
    background: #0078d4;
    color: white;
    border: none;
    padding: 14px 20px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
  }
  .btn-signin:hover { background: #106ebe; }
  .ms-logo {
    width: 20px;
    height: 20px;
    flex-shrink: 0;
  }
  .note {
    font-size: 12px;
    color: #666;
    margin-top: 20px;
    line-height: 1.6;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">Watch<span>Log</span></div>
  <div class="tagline">Your personal streaming diary</div>

  <a class="btn-signin" href="/.auth/login/aad?post_login_redirect_uri=/">
    <svg class="ms-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 23 23">
      <rect x="1" y="1" width="10" height="10" fill="#f25022"/>
      <rect x="12" y="1" width="10" height="10" fill="#7fba00"/>
      <rect x="1" y="12" width="10" height="10" fill="#00a4ef"/>
      <rect x="12" y="12" width="10" height="10" fill="#ffb900"/>
    </svg>
    Sign in with Microsoft
  </a>

  <p class="note">You must be invited to access WatchLog.<br>Contact the app owner to request access.</p>
</div>
</body>
</html>
